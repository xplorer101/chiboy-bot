    <!-- Top Navigation -->

    <!-- Desktop Sidebar -->
    
    <div class="main" style="padding-top: 70px;">
        <div class="header">
            <h1><i class="fas fa-bullseye" style="color:var(--accent-gold);"></i> Trading Opportunities</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn" onclick="loadOpportunities()">
                    <i class="fas fa-sync-alt refresh-icon"></i> <span class="btn-text">Refresh</span>
                </button>
                <button class="refresh-btn" onclick="loadSavedOpportunities()" style="background: var(--accent-blue);">
                    <i class="fas fa-bookmark"></i> Saved
                </button>
                <button class="refresh-btn" onclick="clearSavedOpportunities()" style="background: var(--accent-red);">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate">
            <i class="fas fa-clock"></i> Last updated: ---
        </div>
        
        <div class="summary-bar" id="summaryBar">
            <div class="summary-card buy">
                <div class="icon" style="color:var(--accent-green);"><i class="fas fa-arrow-up"></i></div>
                <div>
                    <div class="count" id="buyCount">0</div>
                    <div class="label">Buy Signals</div>
                </div>
            </div>
            <div class="summary-card sell">
                <div class="icon" style="color:var(--accent-red);"><i class="fas fa-arrow-down"></i></div>
                <div>
                    <div class="count" id="sellCount">0</div>
                    <div class="label">Sell Signals</div>
                </div>
            </div>
            <div class="summary-card total">
                <div class="icon" style="color:var(--accent-blue);"><i class="fas fa-chart-bar"></i></div>
                <div>
                    <div class="count" id="totalCount">0</div>
                    <div class="label">Total Scanned</div>
                </div>
            </div>
        </div>
        
        <div class="opportunity-grid" id="opportunityGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Scanning for opportunities...</div>
        </div>
        
        <!-- Saved Opportunities (Watchlist) -->
        <h2 id="savedTitle" style="display:none; margin: 2rem 0 1rem; color: var(--text-primary);">
            <i class="fas fa-bookmark" style="color: var(--accent-blue);"></i> Saved Opportunities
        </h2>
        <div class="opportunity-grid" id="savedOpportunityGrid" style="display:none;">
        </div>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        
        // Apply saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
        
        // Track showing saved
        let showingSaved = false;

        const symbols = [
            'EUR_USD', 'GBP_USD', 'USD_JPY', 'USD_CHF', 'AUD_USD', 'USD_CAD',
            'EUR_GBP', 'EUR_JPY', 'GBP_JPY', 'XAUUSD', 'NAS100', 'SPX500', 
            'US30', 'USOIL', 'BTCUSDT', 'ETHUSDT', 'SOLUSDT'
        ];
        
        function formatPrice(price, symbol) {
            if (!price) return '---';
            if (symbol === 'XAUUSD' || symbol === 'XAGUSD') return price.toFixed(2);
            if (symbol?.endsWith('USDT')) return price.toFixed(2);
            if (symbol?.includes('JPY')) return price.toFixed(3);
            return price.toFixed(5);
        }
        
        async function loadOpportunities() {
            const grid = document.getElementById('opportunityGrid');
            const btn = document.getElementById('refreshBtn');
            if (btn) btn.classList.add('loading');
            
            grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Scanning for opportunities...</div>';
            
            let opportunities = [];
            let buyCount = 0;
            let sellCount = 0;
            
            // Analyze all symbols
            for (const symbol of symbols) {
                try {
                    const response = await fetch('/api/analyze/symbol/' + symbol + '?t=' + Date.now());
                    const data = await response.json();
                    
                    if (data.success && data.ict) {
                        const ict = data.ict;
                        if (ict.signal) {
                            const opp = {
                                symbol: symbol,
                                signal: ict.signal,
                                entry_price: ict.entry_price,
                                stop_loss: ict.stop_loss,
                                take_profit: ict.take_profit,
                                risk_reward: ict.risk_reward,
                                reasons: ict.reasons || [],
                                current_price: data.current_price
                            };
                            opportunities.push(opp);
                            
                            if (ict.signal === 'BUY') buyCount++;
                            else if (ict.signal === 'SELL') sellCount++;
                        }
                    }
                } catch (e) {
                    console.error('Error analyzing', symbol, e);
                }
            }
            
            // Update summary
            document.getElementById('buyCount').textContent = buyCount;
            document.getElementById('sellCount').textContent = sellCount;
            document.getElementById('totalCount').textContent = symbols.length;
            document.getElementById('lastUpdate').innerHTML = '<i class="fas fa-clock"></i> Last updated: ' + new Date().toLocaleTimeString();
            
            // Remove loading state
            btn.classList.remove('loading');
            
            // Render opportunities
            if (opportunities.length === 0) {
                grid.innerHTML = `
                    <div class="no-opp">
                        <i class="fas fa-search"></i>
                        <h3>No Signals Found</h3>
                        <p>No valid ICT trading opportunities at the moment. Check back later.</p>
                    </div>
                `;
            } else {
                // Sort: BUY first, then SELL
                opportunities.sort((a, b) => {
                    if (a.signal === 'BUY' && b.signal !== 'BUY') return -1;
                    if (a.signal === 'SELL' && b.signal !== 'SELL') return 1;
                    return 0;
                });
                
                grid.innerHTML = opportunities.map(opp => `
                    <div class="opp-card signal-${opp.signal.toLowerCase()}" id="card-${opp.symbol}">
                        <div class="opp-header">
                            <div class="opp-symbol">${opp.symbol}</div>
                            <div class="opp-direction ${opp.signal.toLowerCase()}">${opp.signal}</div>
                        </div>
                        <div class="opp-prices">
                            <div class="opp-price">
                                <div class="opp-price-label">Entry</div>
                                <div class="opp-price-value entry">${formatPrice(opp.entry_price, opp.symbol)}</div>
                            </div>
                            <div class="opp-price">
                                <div class="opp-price-label">Stop Loss</div>
                                <div class="opp-price-value sl">${formatPrice(opp.stop_loss, opp.symbol)}</div>
                            </div>
                            <div class="opp-price">
                                <div class="opp-price-label">Take Profit</div>
                                <div class="opp-price-value tp">${formatPrice(opp.take_profit, opp.symbol)}</div>
                            </div>
                        </div>
                        <div class="opp-rr">${opp.risk_reward || '1:3'}</div>
                        <div class="opp-reasons">
                            <ul>
                                ${opp.reasons.map(r => `<li>${r}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="opp-timeframe">
                            <i class="fas fa-clock"></i> Real-time data
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="keep-btn" onclick="keepOpportunity('${opp.symbol}', '${opp.signal}', ${opp.entry_price}, ${opp.stop_loss}, ${opp.take_profit}, '${opp.risk_reward || '1:3'}', ${JSON.stringify(opp.reasons).replace(/"/g, '&quot;')})" style="flex: 1;">
                                <i class="fas fa-bookmark"></i> Keep
                            </button>
                            <button class="keep-btn" onclick="saveOppToSignal('${opp.symbol}', '${opp.signal}', ${opp.entry_price}, ${opp.stop_loss}, ${opp.take_profit}, '${opp.risk_reward || '1:3'}', ${JSON.stringify(opp.reasons).replace(/"/g, '&quot;')})" style="flex: 1; background: var(--accent-gold); color: #000;">
                                <i class="fas fa-save"></i> Save
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Remove loading state
            btn.classList.remove('loading');
        }
        
        // Load on page load
        loadOpportunities();
        
        // Auto-refresh every 15 seconds for real-time updates
        setInterval(loadOpportunities, 15000);
        
        // Keep button function (called from inline onclick)
        async function keepOpportunity(symbol, signal, entry_price, stop_loss, take_profit, risk_reward, reasons) {
            try {
                const response = await fetch('/api/saved-opportunities', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: symbol,
                        asset_type: symbol.includes('USDT') ? 'crypto' : 'forex',
                        direction: signal,
                        timeframe: '15m',
                        entry_price: entry_price,
                        sl: stop_loss,
                        tp: take_profit,
                        confidence: risk_reward ? parseFloat(risk_reward.replace('1:', '')) : 0,
                        reasons: reasons.join('; ')
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert('✓ Saved to watchlist!');
                }
            } catch (e) {
                console.error('Error saving:', e);
                alert('Error saving opportunity');
            }
        }
        
        // Save opportunity directly to Signal History
        async function saveOppToSignal(symbol, signal, entry_price, stop_loss, take_profit, risk_reward, reasons) {
            try {
                const response = await fetch('/api/signals', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: symbol,
                        timeframe: '15m',
                        direction: signal,
                        entry_price: entry_price,
                        sl: stop_loss,
                        tp: take_profit,
                        confidence: risk_reward ? parseFloat(risk_reward.replace('1:', '')) * 20 : 60,
                        reasons: Array.isArray(reasons) ? reasons.join('; ') : reasons
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert('✓ Saved to Signal History!');
                } else {
                    alert('Error: ' + (data.error || 'Could not save signal'));
                }
            } catch (e) {
                console.error('Error saving signal:', e);
                alert('Error saving signal');
            }
        }
        
        // ===== SAVED OPPORTUNITIES (WATCHLIST) FUNCTIONS =====
        
        async function saveOpportunity(opp) {
            try {
                const response = await fetch('/api/saved-opportunities', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: opp.symbol,
                        asset_type: opp.symbol.includes('USDT') ? 'crypto' : 'forex',
                        direction: opp.signal,
                        timeframe: '15m',
                        entry_price: opp.entry_price,
                        sl: opp.stop_loss,
                        tp: opp.take_profit,
                        confidence: opp.risk_reward ? parseFloat(opp.risk_reward.replace('1:', '')) : 0,
                        reasons: opp.reasons.join('; ')
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Opportunity saved to watchlist!');
                }
            } catch (e) {
                console.error('Error saving opportunity:', e);
            }
        }
        
        async function loadSavedOpportunities() {
            const grid = document.getElementById('savedOpportunityGrid');
            const title = document.getElementById('savedTitle');
            const mainGrid = document.getElementById('opportunityGrid');
            
            title.style.display = 'block';
            grid.style.display = 'grid';
            mainGrid.style.display = 'none';
            document.getElementById('summaryBar').style.display = 'none';
            
            grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading saved opportunities...</div>';
            
            try {
                const response = await fetch('/api/saved-opportunities');
                const data = await response.json();
                
                if (data.success && data.opportunities.length > 0) {
                    grid.innerHTML = data.opportunities.map(opp => `
                        <div class="opportunity-card ${opp.direction.toLowerCase()}">
                            <div class="opp-header">
                                <div class="opp-symbol">${opp.symbol}</div>
                                <div class="opp-direction ${opp.direction.toLowerCase()}">${opp.direction}</div>
                            </div>
                            <div class="opp-prices">
                                <div class="opp-price">
                                    <div class="opp-price-label">Entry</div>
                                    <div class="opp-price-value entry">${formatPrice(opp.entry_price, opp.symbol)}</div>
                                </div>
                                <div class="opp-price">
                                    <div class="opp-price-label">Stop Loss</div>
                                    <div class="opp-price-value sl">${formatPrice(opp.sl, opp.symbol)}</div>
                                </div>
                                <div class="opp-price">
                                    <div class="opp-price-label">Take Profit</div>
                                    <div class="opp-price-value tp">${formatPrice(opp.tp, opp.symbol)}</div>
                                </div>
                            </div>
                            <div class="opp-rr">1:${opp.confidence || 3}</div>
                            <div class="opp-reasons">
                                <ul>
                                    ${(opp.reasons || '').split(';').filter(r => r).map(r => `<li>${r}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="opp-timeframe">
                                <i class="fas fa-clock"></i> Saved: ${new Date(opp.created_at).toLocaleDateString()}
                                <button onclick="deleteSavedOpportunity(${opp.id})" style="margin-left: 10px; background: var(--accent-red); border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: white;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div class="loading">No saved opportunities. Click "Keep" on an opportunity to save it.</div>';
                }
            } catch (e) {
                console.error('Error loading saved:', e);
                grid.innerHTML = '<div class="loading">Error loading saved opportunities</div>';
            }
        }
        
        async function clearSavedOpportunities() {
            if (!confirm('Clear all saved opportunities?')) return;
            
            try {
                const response = await fetch('/api/saved-opportunities/clear', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    alert(`Cleared ${data.cleared} opportunities`);
                    loadSavedOpportunities();
                }
            } catch (e) {
                console.error('Error clearing:', e);
            }
        }
        
        async function deleteSavedOpportunity(id) {
            try {
                const response = await fetch('/api/saved-opportunities/' + id, {method: 'DELETE'});
                const data = await response.json();
                if (data.success) {
                    loadSavedOpportunities();
                }
            } catch (e) {
                console.error('Error deleting:', e);
            }
        }
        
        // Show Keep button on each opportunity
        const originalLoadOpportunities = loadOpportunities;
        loadOpportunities = async function() {
            await originalLoadOpportunities();
            // Add Keep buttons to all cards
            document.querySelectorAll('.opportunity-card').forEach((card, idx) => {
                if (!card.querySelector('.keep-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'keep-btn';
                    btn.innerHTML = '<i class="fas fa-bookmark"></i> Keep';
                    btn.style.cssText = 'margin-top: 10px; background: var(--accent-blue); border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; color: white; width: 100%;';
                    btn.onclick = () => {
                        const symbol = card.querySelector('.opp-symbol').textContent;
                        const direction = card.querySelector('.opp-direction').textContent;
                        const entry = card.querySelector('.entry').textContent;
                        const sl = card.querySelector('.sl').textContent;
                        const tp = card.querySelector('.tp').textContent;
                        const rr = card.querySelector('.opp-rr').textContent;
                        const reasons = Array.from(card.querySelectorAll('.opp-reasons li')).map(li => li.textContent);
                        
                        saveOpportunity({
                            symbol, signal: direction, 
                            entry_price: parseFloat(entry.replace(/,/g, '')),
                            stop_loss: parseFloat(sl.replace(/,/g, '')),
                            take_profit: parseFloat(tp.replace(/,/g, '')),
                            risk_reward: rr,
                            reasons
                        });
                    };
                    card.appendChild(btn);
                }
            });
            
            // Reset display when going back to live
            document.getElementById('savedOpportunityGrid').style.display = 'none';
            document.getElementById('savedTitle').style.display = 'none';
            document.getElementById('opportunityGrid').style.display = 'grid';
            document.getElementById('summaryBar').style.display = 'flex';
        };
    </script>
    <script>
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        
        // Apply saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // Apply saved theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
        })();
    </script>
<script>
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        
        // Apply saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        // Highlight active menu link
        (function() {
            var path = window.location.pathname;
            if (path === '/') path = '/';
            document.querySelectorAll('.menu-link').forEach(function(link) {
                var href = link.getAttribute('href');
                if (href === path || (path === '/' && href === '/')) {
                    link.classList.add('active');
                } else if (path.startsWith(href) && href !== '/') {
                    link.classList.add('active');
                }
            });
        })();
    </script>
